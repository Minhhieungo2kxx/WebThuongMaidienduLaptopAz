spring.profiles.active=dev



#config max upload file size va count file

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-swallow-size=52428800

# config log
# logging.level.org.springframework.security=debug;


# config session
spring.session.store-type=jdbc
server.servlet.session.timeout=30m
spring.session.jdbc.initialize-schema=always
# spring.session.jdbc.schema=
# spring.session.jdbc.table-name=


# Email configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub


# === API GEMINI  API key ===
gemini.api.key=${GEMINI_API_KEYS}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta/models
gemini.api.models=gemini-3.1-flash-lite,gemini-2.5-flash-lite,gemini-2.5-flash,gemini-3-flash,gemini-3.5-flash





logging.level.org.springframework.web=DEBUG


vnp.tmn-code=${VNP_TMN_CODE}
vnp.hash-secret=${VNP_HASH_SECRET}

access.key=${ACCESS_KEY}
secret.key=${SECRET_KEY}

#config uploadFile Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.devtools.restart.exclude=**/dotenv-*.jar
# Cau hinh Redis cho Spring Boot
spring.data.redis.standalone.host=localhost
spring.data.redis.standalone.port=6379
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.cache=TRACE

